services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORTAL_URL=http://portal:3000
      - SITE_DOMAIN=emeraldcity.xyz
      - CLIENT_URL=https://dsite-client.vercel.app
      - WALRUS_CONTEXT=mainnet
      - WALRUS_EPOCHS=1
      - PORT=3000
      # These should be set via Coolify env vars (secrets):
      # - SESSION_SECRET=
      # - ENCRYPTION_KEY=
      # - ADMIN_MNEMONICS=
      # - GITHUB_CLIENT_ID=
      # - GITHUB_CLIENT_SECRET=
    volumes:
      - backend-data:/app/data
      - backend-builds:/app/builds
    depends_on:
      - portal
    restart: unless-stopped

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    environment:
      - PORTAL_CONFIG=/etc/walrus-sites/portal-config.yaml
    restart: unless-stopped

volumes:
  backend-data:
  backend-builds:
