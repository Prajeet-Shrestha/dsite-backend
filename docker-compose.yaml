services:
  backend:
    build: .
    ports:
      - "3000:3000"
    labels:
      # Wildcard subdomain routing for deployed sites (Traefik v3 syntax)
      - "traefik.enable=true"
      - "traefik.http.routers.dsite-wildcard-https.rule=HostRegexp(`^.+\\.emeraldcity\\.xyz$$`)"
      - "traefik.http.routers.dsite-wildcard-https.entrypoints=https"
      - "traefik.http.routers.dsite-wildcard-https.tls=true"
      - "traefik.http.routers.dsite-wildcard-https.service=dsite-backend"
      - "traefik.http.routers.dsite-wildcard-http.rule=HostRegexp(`^.+\\.emeraldcity\\.xyz$$`)"
      - "traefik.http.routers.dsite-wildcard-http.entrypoints=http"
      - "traefik.http.routers.dsite-wildcard-http.service=dsite-backend"
      - "traefik.http.services.dsite-backend.loadbalancer.server.port=3000"
    environment:
      - NODE_ENV=production
      - PORTAL_URL=http://portal:3000
      - SITE_DOMAIN=emeraldcity.xyz
      - CLIENT_URL=https://dsite-client.vercel.app
      - WALRUS_CONTEXT=mainnet
      - WALRUS_EPOCHS=1
      - PORT=3000
      # These should be set via Coolify env vars (secrets):
      # - SESSION_SECRET=
      # - ENCRYPTION_KEY=
      # - ADMIN_MNEMONICS=
      # - GITHUB_CLIENT_ID=
      # - GITHUB_CLIENT_SECRET=
    volumes:
      - backend-data:/app/data
      - backend-builds:/app/builds
    depends_on:
      - portal
    networks:
      - coolify
      - default
    restart: unless-stopped

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    environment:
      - PORTAL_CONFIG=/etc/walrus-sites/portal-config.yaml
    restart: unless-stopped

networks:
  coolify:
    external: true

volumes:
  backend-data:
  backend-builds:
